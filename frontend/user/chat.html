<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chat — Student Bazar</title>
<meta name="description" content="Real-time messaging on Student Bazar."/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{heading:['Poppins'],body:['Inter']},colors:{primary:{DEFAULT:'#4F46E5',dark:'#3730A3'},accent:'#F59E0B',success:'#10B981',danger:'#EF4444',dark:{bg:'#0F172A',card:'#1E293B',border:'#334155'}}}}}</script>
<style>
body{font-family:'Inter',sans-serif}.dark body{background:#0F172A;color:#E2E8F0}html:not(.dark) body{background:#F8FAFC;color:#1E293B}
.nav-glass{background:rgba(15,23,42,.8);backdrop-filter:blur(16px);border-bottom:1px solid rgba(51,65,85,.5)}
html:not(.dark) .nav-glass{background:rgba(248,250,252,.85);border-bottom:1px solid #E2E8F0}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;animation:msgIn .2s ease}
.msg-sent{background:#4F46E5;color:#fff;border-bottom-right-radius:4px;margin-left:auto}
.msg-received{background:#1E293B;border:1px solid #334155;border-bottom-left-radius:4px}
html:not(.dark) .msg-received{background:#F1F5F9;border-color:#E2E8F0;color:#1E293B}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.typing-dot{width:6px;height:6px;border-radius:50%;background:#9CA3AF;display:inline-block;animation:typingBounce .6s infinite alternate}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{to{transform:translateY(-4px);opacity:.5}}
</style>
</head>
<body class="h-screen flex flex-col">

<!-- Nav -->
<nav class="nav-glass flex-shrink-0 px-4">
  <div class="max-w-[800px] mx-auto flex items-center justify-between h-14">
    <a href="/user/" class="text-lg"><i class="fas fa-arrow-left"></i></a>
    <div class="text-center">
      <span class="font-heading font-bold text-sm" id="chatTitle">Messages</span>
      <div class="text-[10px] text-success font-semibold" id="onlineStatus">● Online</div>
    </div>
    <button class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center text-white font-bold text-xs" id="chatAvatar">?</button>
  </div>
</nav>

<!-- Chat Rooms List -->
<div id="roomsList" class="flex-1 overflow-y-auto">
  <div class="max-w-[800px] mx-auto px-4 py-4">
    <h2 class="font-heading font-bold text-lg mb-4">Conversations</h2>
    <div id="rooms" class="space-y-2"></div>
  </div>
</div>

<!-- Chat Room View -->
<div id="chatRoom" class="flex-1 flex flex-col hidden">
  <!-- Product Context -->
  <div class="px-4 py-2 border-b border-dark-border flex items-center gap-3" id="productContext" style="display:none">
    <span class="text-2xl" id="ctxEmoji">📦</span>
    <div class="flex-1 min-w-0"><div class="font-semibold text-xs truncate" id="ctxTitle">Item</div><div class="text-primary font-bold text-xs" id="ctxPrice">₹0</div></div>
    <button class="text-xs text-primary">View</button>
  </div>

  <!-- Messages -->
  <div class="flex-1 overflow-y-auto px-4 py-4" id="messagesContainer">
    <div class="flex flex-col gap-2" id="messagesList"></div>
    <div id="typingIndicator" class="hidden mt-2 flex items-center gap-2 text-xs text-gray-500">
      <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
      <span class="ml-1">typing...</span>
    </div>
  </div>

  <!-- Input -->
  <div class="flex-shrink-0 p-4 border-t border-dark-border nav-glass">
    <div class="max-w-[800px] mx-auto flex gap-2">
      <input id="msgInput" type="text" placeholder="Type a message..." class="flex-1 px-4 py-3 rounded-xl border border-dark-border bg-transparent text-sm focus:outline-none focus:ring-2 focus:ring-primary/50" onkeydown="if(event.key==='Enter')sendMessage()"/>
      <button onclick="sendMessage()" class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/25 hover:bg-primary-dark transition flex-shrink-0">
        <i class="fas fa-paper-plane text-sm"></i>
      </button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
const token = localStorage.getItem('sb_token');
const user = JSON.parse(localStorage.getItem('sb_user')||'null');
if (!token || !user) window.location.href = '/user/login.html';
(function(){const s=localStorage.getItem('sb_theme');if(s==='light')document.documentElement.classList.remove('dark')})();

let currentRoom = null;
let currentReceiver = null;
let currentProduct = null;
const messages = {};

// Parse query params to auto-open chat if launched from product page
const searchParams = new URLSearchParams(window.location.search);
const initSeller = searchParams.get('seller');
const initProduct = searchParams.get('product');

// Initialize Socket
const socket = io(window.location.origin, {
  auth: { token: token },
  transports: ['websocket', 'polling']
});

socket.on('connect', () => {
    loadRooms();
});

socket.on('receive_message', (msg) => {
    if (msg.roomId === currentRoom) {
        if (!messages[currentRoom]) messages[currentRoom] = [];
        messages[currentRoom].push({
            id: msg._id,
            senderId: msg.senderId,
            text: msg.text,
            timestamp: msg.timestamp
        });
        renderMessages(messages[currentRoom]);
        socket.emit("message_read", { room_id: currentRoom, message_id: msg._id });
    } else {
        loadRooms(); // refresh unread count
    }
});

socket.on('user_typing', (data) => {
    if(data.user_id === currentReceiver) {
        document.getElementById('typingIndicator').classList.remove('hidden');
        clearTimeout(window.typingTimeout);
        window.typingTimeout = setTimeout(() => {
            document.getElementById('typingIndicator').classList.add('hidden');
        }, 3000);
    }
});

async function loadRooms() {
    try {
        const res = await fetch(`${API}/chat/rooms`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        let roomsHtml = data.rooms.map(r => {
            const time = r.lastMessage.timestamp ? new Date(r.lastMessage.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
            // Make sure product object is properly stringified without quotes breaking HTML
            let encodedProduct = 'null';
            if (r.product) {
                encodedProduct = "'" + JSON.stringify(r.product).replace(/'/g, "&apos;") + "'";
            }
            return `
            <div onclick="openRoom('${r.roomId}', '${r.otherUser.id}', '${r.otherUser.name.replace(/'/g, "\\'")}', '${r.otherUser.avatar}', ${encodedProduct})" class="flex items-center gap-3 p-3 rounded-xl hover:bg-dark-card/50 dark:hover:bg-dark-card cursor-pointer transition">
              <div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center text-white font-bold flex-shrink-0">${r.otherUser.avatar}</div>
              <div class="flex-1 min-w-0">
                <div class="flex justify-between items-center">
                  <span class="font-semibold text-sm">${r.otherUser.name}</span>
                  <span class="text-[10px] text-gray-500">${time}</span>
                </div>
                <div class="flex justify-between items-center mt-0.5">
                  <p class="text-xs text-gray-500 truncate">${r.lastMessage.senderId === user._id ? 'You: ' : ''}${r.lastMessage.text}</p>
                  ${r.unread > 0 ? `<span class="w-5 h-5 bg-primary rounded-full flex items-center justify-center text-[10px] text-white font-bold">${r.unread}</span>` : ''}
                </div>
              </div>
            </div>`;
        }).join('');

        if(data.rooms.length === 0 && !initSeller) {
            roomsHtml = '<p class="text-gray-500 text-sm text-center mt-10">No messages yet. Start browsing to chat with sellers!</p>';
        }

        document.getElementById('rooms').innerHTML = roomsHtml;
        gsap.from('#rooms > div',{y:15,opacity:0,duration:.3,stagger:.06});

        // Initialize direct chat if requested
        if (initSeller && !currentRoom) {
            const existingRoom = data.rooms.find(r => r.otherUser.id === initSeller && (r.product ? r.product.id === initProduct : true));
            if (existingRoom) {
               const encodedProd = existingRoom.product ? JSON.stringify(existingRoom.product) : null;
               openRoom(existingRoom.roomId, existingRoom.otherUser.id, existingRoom.otherUser.name, existingRoom.otherUser.avatar, encodedProd);
            } else {
               const tempRoomId = `${user._id}_${initSeller}_${initProduct}`;
               openRoom(tempRoomId, initSeller, 'Seller', 'S', JSON.stringify({id: initProduct, title: 'Item', price: 0, emoji: '📦'}));
            }
        }
    } catch(e) {
        document.getElementById('rooms').innerHTML = '<p class="text-danger text-sm">Failed to load conversations</p>';
    }
}

async function openRoom(roomId, otherUserId, name, avatar, productStr) {
    if(currentRoom) socket.emit("leave_room", { room_id: currentRoom });
    
    currentRoom = roomId;
    currentReceiver = otherUserId;
    
    document.getElementById('roomsList').classList.add('hidden');
    document.getElementById('chatRoom').classList.remove('hidden');
    document.getElementById('chatTitle').textContent = name || 'Chat';
    document.getElementById('chatAvatar').textContent = avatar || '?';

    let product = null;
    if (typeof productStr === 'string' && productStr !== 'null') {
        try { product = JSON.parse(productStr); } catch(e) {}
    } else {
        product = productStr;
    }
    
    currentProduct = product?.id || initProduct;

    if (product) {
        document.getElementById('productContext').style.display = '';
        document.getElementById('ctxEmoji').textContent = product.emoji || '📦';
        document.getElementById('ctxTitle').textContent = product.title || 'Item';
        document.getElementById('ctxPrice').textContent = '₹' + (product.price || 0).toLocaleString('en-IN');
        document.getElementById('productContext').onclick = () => window.location.href = `/user/product.html?id=${product.id}`;
        document.getElementById('productContext').style.cursor = 'pointer';
    } else {
        document.getElementById('productContext').style.display = 'none';
    }

    socket.emit("join_room", { room_id: currentRoom, user_id: user._id });

    try {
        const res = await fetch(`${API}/chat/messages/${currentRoom}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        messages[currentRoom] = data.messages || [];
        renderMessages(messages[currentRoom]);
        loadRooms(); // refresh unread count
    } catch(e) {
        renderMessages([]);
    }
}

function renderMessages(msgs) {
  const el = document.getElementById('messagesList');
  el.innerHTML = msgs.map(m => {
    const isMe = m.senderId === user._id;
    const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    return `
    <div class="flex ${isMe?'justify-end':'justify-start'}">
      <div class="msg-bubble ${isMe?'msg-sent':'msg-received'}">
        <p>${m.text}</p>
        <div class="text-[10px] ${isMe?'text-indigo-200':'text-gray-500'} mt-1 text-right">${time} ${isMe?(m.read?'✓✓':'✓'):''}</div>
      </div>
    </div>`;
  }).join('');
  const container = document.getElementById('messagesContainer');
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentRoom) return;
  input.value = '';

  const now = new Date();
  const msgObj = {
    room_id: currentRoom,
    sender_id: user._id,
    sender_name: user.firstName,
    receiver_id: currentReceiver,
    product_id: currentProduct,
    text: text,
    timestamp: now.toISOString(),
    read: false
  };

  if (!messages[currentRoom]) messages[currentRoom] = [];
  messages[currentRoom].push({
      senderId: user._id,
      text: text,
      timestamp: msgObj.timestamp
  });
  renderMessages(messages[currentRoom]);

  socket.emit("send_message", msgObj);
}

document.getElementById('msgInput').addEventListener('input', () => {
    if(currentRoom) socket.emit('typing', { room_id: currentRoom, user_id: user._id });
});

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&currentRoom){closeRoom()}});
document.querySelector('nav a').onclick = (e) => {
    if (currentRoom) { e.preventDefault(); closeRoom(); }
};

function closeRoom() {
    socket.emit("leave_room", { room_id: currentRoom });
    currentRoom = null;
    currentReceiver = null;
    document.getElementById('chatRoom').classList.add('hidden');
    document.getElementById('roomsList').classList.remove('hidden');
    loadRooms();
    window.history.replaceState({}, document.title, window.location.pathname);
}
</script>
</body>
</html>
